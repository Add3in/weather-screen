<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Veckans väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 5px;
  font-family: Arial, sans-serif;
  background: #1e90ff;
  color: white;
  text-align: center;
  overflow: hidden;
}

h1 {
  font-size: 18px;
  margin: 0 0 5px 0;
  line-height: 1.1;
}

.day {
  display: none;
}

.day.active {
  display: block;
}

.date {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 4px;
}

.icon {
  font-size: 40px;
  margin: 4px 0;
}

.temp {
  font-size: 18px;
  margin-top: 3px;
}

.current {
  font-size: 16px;
  margin-top: 2px;
}
</style>
</head>

<body>

<h1>Veckans väder</h1>
<div id="day-container"></div>

<script>
// Ikoner för både aktuell väderkod och veckokod
const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  45:"🌫️",48:"🌫️",
  51:"🌦️",53:"🌦️",55:"🌧️",
  61:"🌧️",63:"🌧️",65:"🌧️",
  71:"🌨️",73:"🌨️",75:"❄️",
  80:"🌦️",81:"🌧️",82:"⛈️",
  95:"⛈️",96:"⛈️",99:"⛈️"
};

// -------------------------------------------------
// 1. Hämta VECKOVÄDRET först (så korten finns i DOM)
// -------------------------------------------------
fetch("data/weather.json?fresh=" + Date.now())
  .then(r => r.json())
  .then(days => {

    // Filtrera bort dagar som redan passerat
    const today = new Date().toLocaleDateString("sv-SE", { weekday: "long" }).toUpperCase();
    const order = ["MÅNDAG","TISDAG","ONSDAG","TORSDAG","FREDAG","LÖRDAG","SÖNDAG"];
    days = days.filter(d => order.indexOf(d.day) >= order.indexOf(today));

    const cont = document.getElementById("day-container");

    // Skapa dagkort i DOM
    days.forEach((d, idx) => {
      const div = document.createElement("div");
      div.className = "day" + (idx === 0 ? " active" : "");

      div.innerHTML = `
        <div class="date">${d.day}</div>
        <div class="icon">${icons[d.code] || "❓"}</div>
        <div class="temp">Max ${d.max}°C • Min ${d.min}°C</div>
        <div class="current" id="cur-${idx}">Laddar...</div>
      `;

      cont.appendChild(div);
    });

    // -------------------------------------------------
    // 2. Hämta REALTIDSTEMPERATUR EFTER att korten finns
    //    + med tidsfördröjning för att Pages ska hinna leverera filen
    // -------------------------------------------------
    setTimeout(() => {
      fetch("data/current.json?fresh=" + Date.now())
        .then(r => r.json())
        .then(c => {

          const icon = icons[c.code] || "❓";

          // Skriv ut "Just nu" på varje dagkort
          days.forEach((d, idx) => {
            const el = document.getElementById(`cur-${idx}`);
            if (el) {
              el.innerHTML = `Just nu: ${c.temperature}°C ${icon}`;
            }
          });
        })
        .catch(err => console.log("Kunde inte läsa current.json:", err));
    }, 500); // Vänta 0.5 sek

    // -------------------------------------------------
    // 3. Carousel – en dag i taget
    // -------------------------------------------------
    let i = 0;
    setInterval(() => {
      const all = document.querySelectorAll(".day");
      if (all.length < 2) return;

      all[i].classList.remove("active");
      i = (i + 1) % all.length;
      all[i].classList.add("active");
    }, 6000);
  });
</script>

</body>
</html>
