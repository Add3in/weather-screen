<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Veckans väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 5px;
  font-family: Arial, sans-serif;
  background: #1e90ff;
  color: white;
  text-align: center;
  overflow: hidden;
}

h1 {
  font-size: 18px;
  margin: 0 0 5px 0;
  line-height: 1.1;
}

#current {
  font-size: 20px;
  margin-bottom: 6px;
}

.current-icon {
  font-size: 32px;
  vertical-align: middle;
}

.day {
  display: none;
}

.day.active {
  display: block;
}

.date {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 4px;
}

.icon {
  font-size: 40px;
  margin: 4px 0;
}

.temp {
  font-size: 18px;
  margin-top: 3px;
}
</style>
</head>

<body>

<h1>Veckans väder</h1>

<div id="current">Laddar aktuell temperatur...</div>

<div id="day-container"></div>

<script>
const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  45:"🌫️",48:"🌫️",
  51:"🌦️",53:"🌦️",55:"🌧️",
  61:"🌧️",63:"🌧️",65:"🌧️",
  71:"🌨️",73:"🌨️",75:"❄️",
  80:"🌦️",81:"🌧️",82:"⛈️",
  95:"⛈️",96:"⛈️",99:"⛈️"
};

// --------- REALTIDTEMPERATUR ----------
fetch("https://api.open-meteo.com/v1/forecast?latitude=59.3293&longitude=18.0686&current_weather=true")
  .then(r => r.json())
  .then(data => {
    const cur = data.current_weather;
    const icon = icons[cur.weathercode] || "❓";
    document.getElementById("current").innerHTML =
      `Just nu: ${cur.temperature}°C <span class="current-icon">${icon}</span>`;
  });

// --------- VECKOPROGNOS ----------
fetch("data/weather.json")
  .then(r => r.json())
  .then(days => {
    const cont = document.getElementById("day-container");

    days.forEach((d, idx) => {
      const div = document.createElement("div");
      div.className = "day" + (idx === 0 ? " active" : "");
      div.innerHTML = `
        <div class="date">${d.day}</div>
        <div class="icon">${icons[d.code] || "❓"}</div>
        <div class="temp">Max ${d.max}°C • Min ${d.min}°C</div>
      `;
