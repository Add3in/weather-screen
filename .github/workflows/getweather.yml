name: Update weather data

on:
  schedule:
    - cron: "0 * * * *"   # varje hel timme
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # ✅ SKAPA data-mappen först (DETTA SAKNADES)
    - name: Prepare data folder
      run: mkdir -p data

    # --- DAGSVÄDER (MAX / MIN) ---
    - name: Fetch daily forecast
      run: |
        curl -s "https://api.open-meteo.com/v1/forecast?latitude=59.33&longitude=18.06&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm" \
        | jq '
          .daily.time as $d
          | .daily.temperature_2m_max as $max
          | .daily.temperature_2m_min as $min
          | [range(0; $d|length) | {
              day: ($d[.] | strptime("%Y-%m-%d") | strftime("%A") | ascii_upcase),
              max: ($max[.] | round),
              min: ($min[.] | round)
            }]
        ' > data/weather.json

    # --- REALTIDSVÄDER ---
    - name: Fetch current weather
      run: |
        curl -s "https://api.open-meteo.com/v1/forecast?latitude=59.33&longitude=18.06&current_weather=true" \
        | jq '{
            temperature: (.current_weather.temperature | round),
            code: .current_weather.weathercode
          }' > data/current.json

    # --- COMMIT ---
    - name: Commit and push
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add data/weather.json data/current.json
        git commit -m "Update weather data" || echo "No changes"
        git push
