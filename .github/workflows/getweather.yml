name: Update SMHI Daily Weather

on:
  schedule:
    - cron: "0 * * * *"     # varje hel timme
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Fetch SMHI data
      run: |
        curl -s "https://opendata.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/17.92629/lat/59.342632/data.json" \
        -o rawsmhi.json

    - name: Build weather.json (today only)
      run: |
        node << 'EOF'
        const fs = require("fs");
        const raw = JSON.parse(fs.readFileSync("rawsmhi.json"));
        const series = raw.timeSeries;

        const today = new Date().toISOString().slice(0, 10);
        const point = series.find(s => s.validTime.startsWith(today));

        if (!point) {
          console.log("Ingen SMHI-prognos hittad för idag.");
          process.exit(1);
        }

        const params = {};
        point.parameters.forEach(p => params[p.name] = p.values[0]);

        const result = [{
          day: today,
          max: params.tmax ?? params.t,
          min: params.tmin ?? params.t,
          code: params.Wsymb2
        }];

        fs.mkdirSync("data", { recursive: true });
        fs.writeFileSync("data/weather.json", JSON.stringify(result, null, 2));
        EOF

    - name: Commit and push safely
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        git add data/weather.json || true

        if git diff --cached --quiet; then
          echo "Inga ändringar att committa."
          exit 0
        fi

        git commit -m "Updated SMHI weather"
        git push || echo "Push misslyckades men workflowet fortsätter."
