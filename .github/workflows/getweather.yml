name: Update Weekly Weather JSON

on:
  schedule:
    - cron: "0 * * * *"     # Kör varje hel timme
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Fetch weekly forecast (Open-Meteo)
      run: |
        curl -s "https://api.open-meteo.com/v1/forecast?latitude=59.342632&longitude=17.92629&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto" \
        -o rawweather.json

    - name: Build weather.json
      run: |
        node << 'EOF'
        const fs = require("fs");
        const data = JSON.parse(fs.readFileSync("rawweather.json"));

        const result = data.daily.time.map((date, i) => ({
          day: new Date(date).toLocaleDateString("sv-SE", { weekday: "long" }).toUpperCase(),
          max: Math.round(data.daily.temperature_2m_max[i]),
          min: Math.round(data.daily.temperature_2m_min[i]),
          code: data.daily.weathercode[i]
        }));

        fs.mkdirSync("data", { recursive: true });
        fs.writeFileSync("data/weather.json", JSON.stringify(result, null, 2));
        EOF

    - name: Commit and push safely
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        git add data/weather.json || true

        # Om ingen ändring → inget fel
        if git diff --cached --quiet; then
          echo "Inga ändringar att committa."
          exit 0
        fi

        git commit -m "Updated weekly weather"
        git push || echo "Push misslyckades men workflowet fortsätter."
