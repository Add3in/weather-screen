name: Update Weather JSON (Open-Meteo)

on:
  schedule:
    - cron: "0 * * * *"   # kör varje hel timme
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Fetch weekly forecast
      run: |
        curl -s "https://api.open-meteo.com/v1/forecast?latitude=59.34&longitude=17.93&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto" \
        -o rawweather.json

    - name: Build weather.json
      run: |
        node << 'EOF'
        const fs = require("fs");
        
        // Läs Open-Meteo-datan
        const data = JSON.parse(fs.readFileSync("rawweather.json"));
        
        // Konvertera till vårt JSON-format
        const result = data.daily.time.map((date, i) => ({
          day: new Date(date).toLocaleDateString("sv-SE", { weekday: "long" }).toUpperCase(),
          max: Math.round(data.daily.temperature_2m_max[i]),
          min: Math.round(data.daily.temperature_2m_min[i]),
          code: data.daily.weathercode[i]
        }));

        // Skriv filen
        fs.mkdirSync("data", { recursive: true });
        fs.writeFileSync("data/weather.json", JSON.stringify(result, null, 2));
        console.log("Skrev väderdata:", result);
        EOF

    - name: Commit and push safely
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        git add data/weather.json || true

        # Om inget har ändrats
        if git diff --cached --quiet; then
          echo "Inga ändringar att committa."
          exit 0
        fi

        git commit -m "Updated Open-Meteo weather"
        git push || echo "Push misslyckades men workflowet fortsätter."
``
