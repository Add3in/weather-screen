name: Update SMHI Daily Weather

on:
  schedule:
    - cron: "0 * * * *"     # varje hel timme
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    # --- HÄMTA SMHI-PROGNOS ---
    - name: Fetch SMHI data
      run: |
        curl -s "https://opendata.smhi.se/api/category/pmp3g/version/2/geotype/point/lon/17.92629/lat/59.342632/data.json" \
        -o rawsmhi.json

    # --- KONVERTERA SMHI-PROGNOS TILL EN DAG (IDAG) ---
    - name: Build weather.json (today only, SMHI)
      run: |
        node << 'EOF'
        const fs = require("fs");

        // Läs SMHI-datan
        const raw = JSON.parse(fs.readFileSync("rawsmhi.json"));
        const series = raw.timeSeries;

        // Hitta första datapunkten FRAMÅT i tiden (mest stabilt för SMHI)
        const now = new Date();
        const point = series.find(s => new Date(s.validTime) > now);

        if (!point) {
          console.log("Ingen framtida SMHI-prognos hittad.");
          process.exit(1);
        }

        // Mappa SMHI-parametrar
        const params = {};
        point.parameters.forEach(p => {
          params[p.name] = p.values[0];
        });

        // Konstruera format som forecast3.html läser
        const result = [{
          day: new Date().toISOString().slice(0, 10),
          max: params.tmax ?? params.t,
          min: params.tmin ?? params.t,
          code: params.Wsymb2
        }];

        // Skriv JSON-filen
        fs.mkdirSync("data", { recursive: true });
        fs.writeFileSync("data/weather.json", JSON.stringify(result, null, 2));

