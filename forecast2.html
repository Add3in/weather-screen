<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Veckans väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  padding: 10px;
  font-family: Arial, sans-serif;
  background: #1e90ff;
  color: white;
  text-align: center;
  overflow: hidden;
}
h1 {
  font-size: 24px;
  margin: 0 0 10px 0;
}
.day {
  display: none;
}
.day.active {
  display: block;
}
.date {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 5px;
}
.icon {
  font-size: 48px;
  margin: 5px 0;
}
.temp {
  font-size: 20px;
}
</style>
</head>

<body>

<h1>Veckans väder</h1>
<div id="day-container"></div>

<script>
const icons = {
  0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
  45: "🌫️", 48: "🌫️",
  51: "🌦️", 53: "🌦️", 55: "🌧️",
  61: "🌧️", 63: "🌧️", 65: "🌧️",
  71: "🌨️", 73: "🌨️", 75: "❄️",
  80: "🌦️", 81: "🌧️", 82: "⛈️",
  95: "⛈️", 96: "⛈️", 99: "⛈️"
};

fetch("data/weather.json")
  .then(r => r.json())
  .then(days => {
    const cont = document.getElementById("day-container");

    days.forEach((d, idx) => {
      const div = document.createElement("div");
      div.className = "day" + (idx === 0 ? " active" : "");
      div.innerHTML = `
        <div class="date">${d.day}</div>
        <div class="icon">${icons[d.code] || "❓"}</div>
        <div class="temp">Max ${d.max}°C • Min ${d.min}°C</div>
      `;
      cont.appendChild(div);
    });

    let i = 0;
    setInterval(() => {
      const all = document.querySelectorAll(".day");
      all[i].classList.remove("active");
      i = (i + 1) % all.length;
      all[i].classList.add("active");
    }, 6000);
  });
</script>

</body>
</html>
