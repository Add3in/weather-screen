<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Dagens väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #0A76B8;
  font-family: Arial, sans-serif;
  color: white;
}

#box {
  max-width: 600px;
  margin: 2vw auto;
  padding: 3vw;
  background: rgba(255,255,255,0.15);
  border-radius: 24px;
  text-align: center;
}

.icon { font-size: clamp(48px, 10vw, 120px); }
.temp { font-size: clamp(24px, 4vw, 40px); }
.range { font-size: clamp(18px, 3vw, 28px); margin-top: 8px; }
.source { font-size: 12px; opacity: 0.7; margin-top: 6px; }
</style>
</head>

<body>
<div id="box">
  <h1>Dagens väder</h1>
  <div id="content">Laddar väder…</div>
</div>

<script>
const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  45:"🌫️",48:"🌫️",
  51:"🌦️",61:"🌧️",71:"❄️",
  80:"🌦️",95:"⛈️"
};

function show(icon, temp, max, min, source) {
  document.getElementById("content").innerHTML = `
    <div class="icon">${icon}</div>
    <div class="temp">Just nu: ${temp}°C</div>
    <div class="range">Max ${max}° • Min ${min}°</div>
    <div class="source">${source}</div>
  `;
}

// 1️⃣ Försök Open‑Meteo
fetch(
  "https://api.open-meteo.com/v1/forecast" +
  "?latitude=59.33" +
  "&longitude=18.06" +
  "&hourly=temperature_2m,weathercode" +
  "&daily=temperature_2m_max,temperature_2m_min" +
  "&timezone=Europe/Stockholm"
)
.then(r => {
  if (!r.ok) throw new Error("Open-Meteo nere");
  return r.json();
})
.then(d => {
  const idx = d.hourly.time.findIndex(t =>
    t.startsWith(new Date().toISOString().slice(0,13))
  );
  show(
    icons[d.hourly.weathercode[idx]] || "❓",
    Math.round(d.hourly.temperature_2m[idx]),
    Math.round(d.daily.temperature_2m_max[0]),
    Math.round(d.daily.temperature_2m_min[0]),
    "Källa: Open‑Meteo"
  );
})
.catch(() => {

  // 2️⃣ Fallback: YR / MET Norway (väldigt stabil)
  fetch("https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=59.33&lon=18.06", {
    headers: { "User-Agent": "weather-screen" }
  })
  .then(r => r.json())
  .then(d => {
    const now = d.properties.timeseries[0];
    show(
      "🌤️",
      Math.round(now.data.instant.details.air_temperature),
      Math.round(d.properties.timeseries[0].data.next_6_hours.details.air_temperature_max),
      Math.round(d.properties.timeseries[0].data.next_6_hours.details.air_temperature_min),
      "Källa: Yr / MET Norway"
    );
  })
  .catch(() => {
    document.getElementById("content").innerText =
      "Väder tillfälligt otillgängligt";
  });
});

// Uppdatera var 10:e minut
setInterval(() => location.reload(), 600000);
</script>
</body>
</html>
