<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Dagens väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* --- RESPONSIV & MATCHAD BAKGRUND --- */
html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;

  /* Matchar din SmartSign-layout */
  background: linear-gradient(180deg, #0A7EC2 0%, #0B6EAE 100%);

  height: 100%;
  width: 100%;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* --- HUVUDBOX MED GLAS-/TRANSPARENS-EFFEKT --- */
#weather-box {
  width: 95%;
  max-width: 600px;
  background: rgba(255,255,255,0.15);
  padding: 3vw;
  border-radius: 3vw;
  backdrop-filter: blur(5px);
  text-align: center;
  box-sizing: border-box;
}

/* --- Rubriken "Dagens väder" --- */
h1 {
  font-size: clamp(16px, 4vw, 36px);
  margin: 2vw 0;
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

/* --- Dagens veckodag --- */
.day-label {
  font-size: clamp(18px, 4vw, 32px);
  font-weight: bold;
  margin-bottom: 2vw;
}

/* --- Ikonen som skalar efter behållaren --- */
.icon-now {
  font-size: clamp(40px, 12vw, 120px);
  margin-bottom: 2vw;
}

/* --- Just nu-temp --- */
.temp-now {
  font-size: clamp(18px, 4vw, 32px);
  font-weight: bold;
  margin-bottom: 3vw;
}

/* --- Max/min för dagen --- */
.temp-range {
  font-size: clamp(16px, 3vw, 28px);
  margin-bottom: 1vw;
}
</style>
</head>

<body>

<div id="weather-box">
  <h1>Dagens väder</h1>
  <div id="today"></div>
</div>

<script>
// Ikoner för Open-Meteo weathercode
const icons = {
  0:"☀️", 1:"🌤️", 2:"⛅", 3:"☁️",
  45:"🌫️", 48:"🌫️",
  51:"🌦️", 53:"🌦️", 55:"🌧️",
  61:"🌧️", 63:"🌧️", 65:"🌧️",
  71:"🌨️", 73:"🌨️", 75:"❄️",
  80:"🌦️", 81:"🌧️", 82:"⛈️",
  95:"⛈️", 96:"⛈️", 99:"⛈️"
};

// 1. Hämta dagens max/min från weather.json
fetch("data/weather.json?fresh=" + Date.now())
  .then(r => r.json())
  .then(days => {
    const todayName = new Date().toLocaleDateString("sv-SE", { weekday: "long" }).toUpperCase();
    let today = days.find(d => d.day === todayName);
    if (!today) today = days[0];

    // 2. Hämta realtidsväder
    fetch("https://api.open-meteo.com/v1/forecast?latitude=59.33&longitude=18.06&current_weather=true")
      .then(r => r.json())
      .then(now => {
        const cw = now.current_weather;
        const icon = icons[cw.weathercode] || "❓";

        // 3. Bygg widgeten
        document.getElementById("today").innerHTML = `
          <div class="day-label">${todayName}</div>
          <div class="icon-now">${icon}</div>
          <div class="temp-now">Just nu: ${cw.temperature}°C</div>
          <div class="temp-range">Max ${today.max}° • Min ${today.min}°</div>
        `;
      });
  });
</script>

</body>
</html>
