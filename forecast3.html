<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Dagens väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 5px;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
  transition: background 0.5s ease;
}

h1 {
  font-size: 16px;
  margin: 0 0 8px 0;
  line-height: 1.1;
}

.date {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 6px;
}

.icon {
  font-size: 50px;
  margin: 6px 0;
}

.temp {
  font-size: 20px;
  margin-top: 6px;
}
</style>
</head>

<body>

<h1>Dagens väder</h1>
<div id="weather-today"></div>

<script>
// Ikoner
const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  45:"🌫️",48:"🌫️",
  51:"🌦️",53:"🌦️",55:"🌧️",
  61:"🌧️",63:"🌧️",65:"🌧️",
  71:"🌨️",73:"🌨️",75:"❄️",
  80:"🌦️",81:"🌧️",82:"⛈️",
  95:"⛈️",96:"⛈️",99:"⛈️"
};

// Bakgrundsfärg beroende på väderkod
function backgroundFor(code) {
  if (code === 0) return "#66c0ff"; // sol
  if (code === 1 || code === 2) return "#4aa0e0"; // lätt moln
  if (code === 3) return "#3a6d99"; // moln
  if (code >= 51 && code <= 65) return "#385f7a"; // lätt regn
  if (code >= 80 && code <= 82) return "#2f4d66"; // kraftigt regn
  if (code >= 71 && code <= 75) return "#d9e6f2"; // snö
  if (code >= 95) return "#23384d"; // åska
  return "#3a6d99";
}

fetch("data/weather.json?fresh=" + Date.now())
  .then(r => r.json())
  .then(days => {

    const today = new Date().toLocaleDateString("sv-SE", { weekday: "long" }).toUpperCase();

    // Hitta dagens väder från listan
    let match = days.find(d => d.day === today);

    // Om API:t ligger en dag före/efter → visa första elementet
    if (!match) match = days[0];

    // Sätt bakgrund utifrån väderkod
    document.body.style.background = backgroundFor(match.code);

    document.getElementById("weather-today").innerHTML = `
      <div class="date">${match.day}</div>
      <div class="icon">${icons[match.code] || "❓"}</div>
      <div class="temp">Max ${match.max}°C • Min ${match.min}°C</div>
    `;
  });
</script>

</body>
</html>
