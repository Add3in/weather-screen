<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Dagens väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 10px;
  font-family: Arial, sans-serif;
  background: #1e90ff;
  color: white;
  text-align: center;
  overflow: hidden;
}

h1 {
  font-size: 22px;
  margin: 0 0 10px 0;
  font-weight: bold;
}

#weather-box {
  padding: 10px;
  border-radius: 16px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(4px);
  display: inline-block;
}

.icon-now {
  font-size: 60px;
  margin-bottom: 8px;
}

.temp-now {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 12px;
}

.temp-range {
  font-size: 20px;
  margin-top: 6px;
}

.day-label {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 12px;
}
</style>
</head>

<body>

<h1>Dagens väder</h1>

<div id="weather-box">
  <div id="today"></div>
</div>

<script>
// Ikoner för Open-Meteo weathercode
const icons = {
  0:"☀️",
  1:"🌤️",
  2:"⛅",
  3:"☁️",
  45:"🌫️",
  48:"🌫️",
  51:"🌦️",
  53:"🌦️",
  55:"🌧️",
  61:"🌧️",
  63:"🌧️",
  65:"🌧️",
  71:"🌨️",
  73:"🌨️",
  75:"❄️",
  80:"🌦️",
  81:"🌧️",
  82:"⛈️",
  95:"⛈️",
  96:"⛈️",
  99:"⛈️"
};

// 1. Hämta dagens max/min från weather.json
fetch("data/weather.json?fresh=" + Date.now())
  .then(r => r.json())
  .then(days => {
    const todayName = new Date().toLocaleDateString("sv-SE", { weekday: "long" }).toUpperCase();
    let today = days.find(d => d.day === todayName);

    if (!today) today = days[0];

    // 2. Hämta realtidsväder (current_weather)
    fetch("https://api.open-meteo.com/v1/forecast?latitude=59.33&longitude=18.06&current_weather=true")
      .then(r => r.json())
      .then(now => {
        const cw = now.current_weather;
        const nowIcon = icons[cw.weathercode] || "❓";

        // 3. Bygg widgeten
        document.getElementById("today").innerHTML = `
          <div class="day-label">${todayName}</div>
          <div class="icon-now">${nowIcon}</div>
          <div class="temp-now">Just nu: ${cw.temperature}°C</div>
          <div class="temp-range">Max ${today.max}° • Min ${today.min}°</div>
        `;
      });
  });
</script>

</body>
</html>
