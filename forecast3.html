<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Dagens väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  padding:0;
  background:#0A76B8;
  font-family:Arial,sans-serif;
  color:white;
}
#box{
  max-width:600px;
  margin:2vw auto;
  padding:3vw;
  background:rgba(255,255,255,0.15);
  border-radius:24px;
  text-align:center;
}
.icon{font-size:clamp(48px,10vw,120px);}
.temp{font-size:clamp(24px,4vw,40px);}
.range{font-size:clamp(18px,3vw,28px);}
</style>
</head>

<body>
<div id="box">
  <h1>Dagens väder</h1>
  <div id="content">Laddar…</div>
</div>

<script>
const icons={
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  51:"🌦️",61:"🌧️",71:"❄️",
  80:"🌦️",95:"⛈️"
};

Promise.all([
  fetch("data/weather.json").then(r=>r.json()),
  fetch("data/current.json").then(r=>r.json())
]).then(([days,now])=>{
  const dayName=new Date().toLocaleDateString("sv-SE",{weekday:"long"}).toUpperCase();
  const today=days.find(d=>d.day===dayName)||days[0];

  document.getElementById("content").innerHTML=`
    <div class="icon">${icons[now.code]||"❓"}</div>
    <div class="temp">Just nu: ${now.temperature}°C</div>
    <div class="range">Max ${today.max}° • Min ${today.min}°</div>
  `;
}).catch(()=>{
  document.getElementById("content").innerText="Väderdata ej tillgänglig";
});
</script>
</body>
</html>
