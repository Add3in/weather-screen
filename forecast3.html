<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väder</title>

<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  background: #0A76B8;
  font-family: Arial, sans-serif;
  color: white;
}

/* Fyll hela SmartSign-rutan */
#card {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: 8%;
  background: rgba(255,255,255,0.15);
  border-radius: 24px;

  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Rubrik */
#title {
  text-align: center;
  font-size: 1.2em;
  font-weight: bold;
}

/* Ikon */
#icon {
  text-align: center;
  font-size: 3.8em;
  margin-top: 6%;
}

/* Temperatur nu */
#now {
  text-align: center;
  font-size: 1.5em;
  font-weight: bold;
}

/* Max / Min */
#range {
  text-align: center;
  font-size: 1.0em;
  opacity: 0.9;
}

/* Status / fallback */
#status {
  text-align: center;
  font-size: 0.7em;
  opacity: 0.6;
}
</style>
</head>

<body>

<div id="card">
  <div id="title">Väder</div>
  <div id="icon">⏳</div>
  <div id="now">Laddar…</div>
  <div id="range"></div>
  <div id="status"></div>
</div>

<script>
/* Ikoner enligt Open-Meteo */
const icons = {
  0:"☀️",  // klart
  1:"🌤️",
  2:"🌤️",
  3:"☁️",
  45:"🌫️", 48:"🌫️",
  51:"🌦️", 61:"🌧️",
  71:"❄️",
  80:"🌦️",
  95:"⛈️"
};

function show(icon, tempNow, max, min, status="") {
  document.getElementById("icon").textContent = icon;
  document.getElementById("now").textContent = `Just nu: ${tempNow}°C`;
  document.getElementById("range").textContent = `Max ${max}° • Min ${min}°`;
  document.getElementById("status").textContent = status;
}

/* Hämta väder – använd hourly men tolka mänskligt */
fetch(
  "https://api.open-meteo.com/v1/forecast" +
  "?latitude=59.33" +
  "&longitude=18.06" +
  "&hourly=temperature_2m,weathercode" +
  "&daily=temperature_2m_max,temperature_2m_min" +
  "&timezone=Europe/Stockholm"
)
.then(r => {
  if (!r.ok) throw new Error("API nere");
  return r.json();
})
.then(data => {

  const now = new Date();

  // hitta första timme som är efter nu → backa ett steg
  let idx = data.hourly.time.findIndex(t => new Date(t) > now) - 1;
  if (idx < 0) idx = 0;

  const tempNow = Math.round(data.hourly.temperature_2m[idx]);

  // Titta på senaste 2 timmarna för ikon (mer mänskligt)
  const recentCodes = data.hourly.weathercode.slice(
    Math.max(0, idx - 1),
    idx + 1
  );

  const sunnyRecently = recentCodes.some(c => c === 0 || c === 1 || c === 2);
  const icon = sunnyRecently ? "☀️" : (icons[data.hourly.weathercode[idx]] || "❓");

  const max = Math.round(data.daily.temperature_2m_max[0]);
  const min = Math.round(data.daily.temperature_2m_min[0]);

  show(icon, tempNow, max, min, "Källa: Open‑Meteo");

})
.catch(() => {
  document.getElementById("now").textContent = "Väder ej tillgängligt";
  document.getElementById("status").textContent = "Ingen data just nu";
});

// Uppdatera automatiskt var 5:e minut
setInterval(() => location.reload(), 300000);
</script>

</body>
</html>
``
