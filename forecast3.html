<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Väder</title>

<style>
/* Bas – fyll hela SmartSign-rutan */
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  background: #0A76B8;
  font-family: Arial, sans-serif;
  color: white;
}

/* Kortet fyller hela ytan */
#card {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  padding: 6%;
  background: rgba(255,255,255,0.15);
  border-radius: 24px;

  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Rubrik */
#title {
  font-size: 1.2em;
  font-weight: bold;
  text-align: center;
}

/* Ikon */
#icon {
  font-size: 3.5em;
  text-align: center;
}

/* Temperatur nu */
#now {
  font-size: 1.4em;
  font-weight: bold;
  text-align: center;
}

/* Max/min */
#range {
  font-size: 0.95em;
  text-align: center;
  opacity: 0.9;
}

/* Källa eller feltext */
#status {
  font-size: 0.7em;
  text-align: center;
  opacity: 0.6;
}
</style>
</head>

<body>

<div id="card">
  <div id="title">Väder</div>
  <div id="icon">⏳</div>
  <div id="now">Laddar…</div>
  <div id="range"> </div>
  <div id="status"> </div>
</div>

<script>
// Ikoner (Open-Meteo/YR-kompatibla)
const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  45:"🌫️",48:"🌫️",
  51:"🌦️",61:"🌧️",71:"❄️",
  80:"🌦️",95:"⛈️"
};

function show(icon, now, max, min, source) {
  document.getElementById("icon").textContent = icon;
  document.getElementById("now").textContent = `Just nu: ${now}°C`;
  document.getElementById("range").textContent = `Max ${max}° • Min ${min}°`;
  document.getElementById("status").textContent = source;
}

/* Försök Open‑Meteo hourly (stabilare än current_weather) */
fetch("https://api.open-meteo.com/v1/forecast?latitude=59.33&longitude=18.06&hourly=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm")
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(d => {
    const idx = d.hourly.time.findIndex(t =>
      t.startsWith(new Date().toISOString().slice(0,13))
    );
    show(
      icons[d.hourly.weathercode[idx]] || "❓",
      Math.round(d.hourly.temperature_2m[idx]),
      Math.round(d.daily.temperature_2m_max[0]),
      Math.round(d.daily.temperature_2m_min[0]),
      "Open‑Meteo"
    );
  })
  .catch(() => {
    document.getElementById("now").textContent = "Väder ej tillgängligt";
    document.getElementById("status").textContent = "Ingen data";
  });

// Auto‑uppdatera var 5:e minut
setInterval(() => location.reload(), 300000);
</script>

</body>
</html>
